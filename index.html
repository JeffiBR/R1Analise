<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta http-equiv="refresh" content="5;url=https://trading-seriously-respiratory-parent.trycloudflare.com">
  <title>Abrindo o sistema</title>
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 24px;
      background: #f4f6f8;
      color: #172033;
      font-family: Arial, Helvetica, sans-serif;
    }
    main {
      width: 100%;
      max-width: 420px;
      padding: 36px 32px;
      text-align: center;
      background: #fff;
      border: 1px solid #dfe4ea;
      border-radius: 12px;
      box-shadow: 0 8px 24px rgba(23, 32, 51, .08);
    }
    .icon {
      width: 52px;
      height: 52px;
      display: grid;
      place-items: center;
      margin: 0 auto 22px;
      border-radius: 10px;
      background: #4f46e5;
      color: #fff;
      font-size: 25px;
      font-weight: bold;
    }
    h1 { margin: 0; font-size: 24px; line-height: 1.25; }
    p { margin: 12px 0 0; color: #667085; font-size: 14px; line-height: 1.55; }
    .status {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 9px;
      margin: 24px 0;
      color: #475467;
      font-size: 13px;
    }
    .spinner {
      width: 17px;
      height: 17px;
      border: 2px solid #d0d5dd;
      border-top-color: #4f46e5;
      border-radius: 50%;
      animation: spin .8s linear infinite;
    }
    a {
      display: block;
      padding: 12px 18px;
      border-radius: 8px;
      background: #4f46e5;
      color: #fff;
      font-size: 14px;
      font-weight: bold;
      text-decoration: none;
    }
    a:hover { background: #4338ca; }
    small { display: block; margin-top: 15px; color: #98a2b3; font-size: 11px; }
    @keyframes spin { to { transform: rotate(360deg); } }
    @media (prefers-reduced-motion: reduce) { .spinner { animation: none; } }
  </style>
</head>
<body>
  <main>
    <div class="icon" aria-hidden="true">R1</div>
    <h1>Abrindo o sistema</h1>
    <p>Você será direcionado para o endereço online mais recente.</p>
    <div class="status"><span class="spinner" aria-hidden="true"></span><span id="status">Conectando...</span></div>
    <a href="https://trading-seriously-respiratory-parent.trycloudflare.com">Acessar agora</a>
    <small>O redirecionamento é automático.</small>
  </main>
  <script>
    const target = "https://trading-seriously-respiratory-parent.trycloudflare.com";
    window.setTimeout(() => {
      document.getElementById('status').textContent = 'Acesso encontrado. Abrindo...';
      window.location.replace(target);
    }, 1800);
  </script>
</body>
</html>
